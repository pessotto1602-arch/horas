<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Controle de Ponto</title>
<style>
  :root{
    --bg:#0f1720;
    --bg-card:#182430;
    --bg-card-2:#1f2e3c;
    --border:#2a3b4a;
    --text:#eaf1f7;
    --text-dim:#8fa3b3;
    --green:#2ecc71;
    --green-dim:#1e5c3a;
    --red:#e74c3c;
    --red-dim:#5c2320;
    --blue:#3ba7ff;
    --amber:#f0a93a;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-user-select:none; user-select:none;}
  input, textarea{-webkit-user-select:text; user-select:text;}
  #app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  header{position:sticky; top:0; z-index:10; background:var(--bg); padding:16px 16px 0 16px; border-bottom:1px solid var(--border);}
  header h1{font-size:19px; margin:0 0 12px 0; font-weight:700; letter-spacing:.3px;}

  .tabs{display:flex; gap:8px; padding-bottom:10px;}
  .tab-btn{flex:1; padding:11px 8px; border:none; border-radius:10px; background:var(--bg-card); color:var(--text-dim); font-size:14px; font-weight:600; touch-action:manipulation;}
  .tab-btn.active{background:var(--blue); color:#06202f;}

  main{flex:1; padding:14px 16px 90px 16px;}
  section{display:none;}
  section.active{display:block;}

  .month-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .month-nav button{background:var(--bg-card); border:none; color:var(--text); width:40px; height:40px; border-radius:10px; font-size:18px; touch-action:manipulation;}
  .month-nav .month-label{font-size:16px; font-weight:700; text-transform:capitalize;}

  .summary-bar{display:flex; gap:8px; margin-bottom:14px;}
  .summary-chip{flex:1; background:var(--bg-card); border-radius:12px; padding:10px 8px; text-align:center;}
  .summary-chip .num{font-size:17px; font-weight:800;}
  .summary-chip .lbl{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .day-row{background:var(--bg-card); border-radius:var(--radius); padding:10px 12px; margin-bottom:8px; border:1px solid var(--border);}
  .day-row.weekend{background:var(--bg-card-2);}
  .day-top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .day-info{display:flex; align-items:baseline; gap:8px; min-width:56px;}
  .day-info .day-num{font-size:18px; font-weight:800;}
  .day-info .day-week{font-size:11px; color:var(--text-dim); text-transform:uppercase;}

  .day-actions{display:flex; gap:6px; flex:1;}
  .btn-status{flex:1; padding:9px 4px; border-radius:9px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:12.5px; font-weight:700; touch-action:manipulation; white-space:nowrap;}
  .btn-status.btn-trabalhou.on{background:var(--green-dim); border-color:var(--green); color:var(--green);}
  .btn-status.btn-falta.on{background:var(--red-dim); border-color:var(--red); color:var(--red);}

  .day-horas{display:none; gap:6px; margin-top:8px;}
  .day-horas.show{display:flex;}
  .btn-horas{flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:13px; font-weight:700; touch-action:manipulation;}
  .btn-horas.on{background:var(--blue); border-color:var(--blue); color:#06202f;}

  .card{background:var(--bg-card); border-radius:var(--radius); padding:14px; margin-bottom:14px; border:1px solid var(--border);}
  .card h2{font-size:14px; margin:0 0 10px 0; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px;}
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:5px;}
  .field input{width:100%; padding:11px 12px; border-radius:9px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:15px;}

  .btn-primary{width:100%; padding:12px; border:none; border-radius:10px; background:var(--blue); color:#06202f; font-size:15px; font-weight:800; touch-action:manipulation;}

  .totals-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .total-box{background:var(--bg-card-2); border-radius:10px; padding:12px 10px;}
  .total-box .num{font-size:17px; font-weight:800;}
  .total-box .lbl{font-size:11px; color:var(--text-dim); margin-top:3px;}
  .total-box.saldo{grid-column:1 / -1; background:linear-gradient(135deg,#134a2c,#0f3b23); border:1px solid var(--green);}
  .total-box.saldo .num{color:var(--green); font-size:22px;}

  .receb-item{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);}
  .receb-item:last-child{border-bottom:none;}
  .receb-info .val{font-weight:800; font-size:15px; color:var(--green);}
  .receb-info .meta{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .receb-del{background:none; border:none; color:var(--red); font-size:16px; padding:6px 10px; touch-action:manipulation;}

  .empty{text-align:center; color:var(--text-dim); font-size:13px; padding:20px 0;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Controle de Ponto</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="registro" id="btn-tab-registro">Registro</button>
      <button class="tab-btn" data-tab="desconto" id="btn-tab-desconto">Desconto</button>
    </div>
  </header>

  <main>
    <section id="tab-registro" class="active">
      <div class="month-nav">
        <button id="prev-month">‹</button>
        <div class="month-label" id="month-label">-</div>
        <button id="next-month">›</button>
      </div>

      <div class="summary-bar">
        <div class="summary-chip"><div class="num" id="sum-trabalhados">0</div><div class="lbl">Dias trab.</div></div>
        <div class="summary-chip"><div class="num" id="sum-horas">0h</div><div class="lbl">Horas</div></div>
        <div class="summary-chip"><div class="num" id="sum-faltas">0</div><div class="lbl">Faltas</div></div>
      </div>

      <div id="days-list"></div>

      <button class="btn-primary" id="btn-share-whatsapp" style="margin-top:14px;">Compartilhar relatório no WhatsApp</button>
    </section>

    <section id="tab-desconto">
      <div class="card">
        <h2>Valor do dia</h2>
        <div class="field">
          <label for="valor-dia">Valor por dia (R$)</label>
          <input type="number" id="valor-dia" inputmode="decimal" step="0.01" placeholder="0,00">
        </div>
      </div>

      <div class="card">
        <h2>Resumo geral</h2>
        <div class="totals-grid">
          <div class="total-box"><div class="num" id="tot-horas">0h</div><div class="lbl">Horas trabalhadas</div></div>
          <div class="total-box"><div class="num" id="tot-valor">R$ 0,00</div><div class="lbl">Valor total</div></div>
          <div class="total-box"><div class="num" id="tot-recebido">R$ 0,00</div><div class="lbl">Já recebido</div></div>
          <div class="total-box saldo"><div class="num" id="tot-saldo">R$ 0,00</div><div class="lbl">Saldo a receber</div></div>
        </div>
      </div>

      <div class="card">
        <h2>Registrar dinheiro recebido</h2>
        <div class="field">
          <label for="receb-data">Data</label>
          <input type="date" id="receb-data">
        </div>
        <div class="field">
          <label for="receb-valor">Valor (R$)</label>
          <input type="number" id="receb-valor" inputmode="decimal" step="0.01" placeholder="0,00">
        </div>
        <div class="field">
          <label for="receb-desc">Descrição (opcional)</label>
          <input type="text" id="receb-desc" placeholder="Ex: adiantamento">
        </div>
        <button class="btn-primary" id="btn-add-receb">Adicionar recebimento</button>
      </div>

      <div class="card">
        <h2>Recebimentos</h2>
        <div id="receb-list"></div>
      </div>
    </section>
  </main>
</div>

<script>
(function(){
  "use strict";

  var DB_NAME = "controlePontoDB";
  var DB_VERSION = 1;
  var db = null;
  var useLocalStorage = false;

  function openDatabase(){
    return new Promise(function(resolve){
      if(!window.indexedDB){ useLocalStorage = true; resolve(); return; }
      var req;
      try{ req = indexedDB.open(DB_NAME, DB_VERSION); }
      catch(e){ useLocalStorage = true; resolve(); return; }
      req.onupgradeneeded = function(e){
        var d = e.target.result;
        if(!d.objectStoreNames.contains("dias")) d.createObjectStore("dias", {keyPath:"data"});
        if(!d.objectStoreNames.contains("recebimentos")) d.createObjectStore("recebimentos", {keyPath:"id"});
        if(!d.objectStoreNames.contains("config")) d.createObjectStore("config", {keyPath:"key"});
      };
      req.onsuccess = function(e){ db = e.target.result; resolve(); };
      req.onerror = function(){ useLocalStorage = true; resolve(); };
    });
  }

  function lsGetStore(store){
    try{
      var raw = localStorage.getItem("cp_" + store);
      if(!raw) return store === "recebimentos" ? [] : {};
      return JSON.parse(raw);
    }catch(e){ return store === "recebimentos" ? [] : {}; }
  }
  function lsSetStore(store, data){
    try{ localStorage.setItem("cp_" + store, JSON.stringify(data)); }catch(e){}
  }

  function dbPut(store, value){
    if(useLocalStorage){
      if(store === "recebimentos"){
        var arr = lsGetStore(store);
        var idx = arr.findIndex(function(x){ return x.id === value.id; });
        if(idx >= 0) arr[idx] = value; else arr.push(value);
        lsSetStore(store, arr);
      } else {
        var obj = lsGetStore(store);
        var key = store === "dias" ? value.data : value.key;
        obj[key] = value;
        lsSetStore(store, obj);
      }
      return Promise.resolve(value);
    }
    return new Promise(function(resolve, reject){
      var tx = db.transaction(store, "readwrite");
      var req = tx.objectStore(store).put(value);
      req.onsuccess = function(){ resolve(value); };
      req.onerror = function(){ reject(req.error); };
    });
  }

  function dbDelete(store, key){
    if(useLocalStorage){
      if(store === "recebimentos"){
        var arr = lsGetStore(store).filter(function(x){ return x.id !== key; });
        lsSetStore(store, arr);
      } else {
        var obj = lsGetStore(store);
        delete obj[key];
        lsSetStore(store, obj);
      }
      return Promise.resolve();
    }
    return new Promise(function(resolve, reject){
      var tx = db.transaction(store, "readwrite");
      var req = tx.objectStore(store).delete(key);
      req.onsuccess = function(){ resolve(); };
      req.onerror = function(){ reject(req.error); };
    });
  }

  function dbGetAll(store){
    if(useLocalStorage){
      if(store === "recebimentos") return Promise.resolve(lsGetStore(store));
      return Promise.resolve(Object.values(lsGetStore(store)));
    }
    return new Promise(function(resolve, reject){
      var tx = db.transaction(store, "readonly");
      var req = tx.objectStore(store).getAll();
      req.onsuccess = function(){ resolve(req.result || []); };
      req.onerror = function(){ reject(req.error); };
    });
  }

  // ---------- State ----------
  var today = new Date();
  var curYear = today.getFullYear();
  var curMonth = today.getMonth(); // 0-11
  var diasData = {};        // { "YYYY-MM-DD": {data, trabalhou, horas} }
  var recebimentos = [];    // [{id, data, valor, desc}]
  var valorDia = 0;
  var valorHora = 0;

  function recalcValorHora(){
    valorHora = valorDia > 0 ? (valorDia / 8) : 0;
  }

  var MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var SEMANA = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  function pad2(n){ return n < 10 ? "0" + n : "" + n; }
  function dateKey(y,m,d){ return y + "-" + pad2(m+1) + "-" + pad2(d); }
  function fmtMoney(v){
    v = Number(v) || 0;
    return "R$ " + v.toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  // ---------- Render: Registro ----------
  function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }

  function renderCalendar(){
    document.getElementById("month-label").textContent = MESES[curMonth] + " " + curYear;
    var total = daysInMonth(curYear, curMonth);
    var html = "";
    for(var d=1; d<=total; d++){
      var dt = new Date(curYear, curMonth, d);
      var wk = dt.getDay();
      var key = dateKey(curYear, curMonth, d);
      var entry = diasData[key];
      var isWeekend = (wk === 0 || wk === 6);
      var trabalhouOn = entry && entry.trabalhou === true;
      var faltaOn = entry && entry.trabalhou === false;
      var horas = entry && entry.horas ? entry.horas : null;

      html += '<div class="day-row' + (isWeekend?' weekend':'') + '" data-date="' + key + '">';
      html += '  <div class="day-top">';
      html += '    <div class="day-info"><span class="day-num">' + d + '</span><span class="day-week">' + SEMANA[wk] + '</span></div>';
      html += '    <div class="day-actions">';
      html += '      <button class="btn-status btn-trabalhou' + (trabalhouOn?' on':'') + '" data-date="' + key + '" data-action="trabalhou">Trabalhou</button>';
      html += '      <button class="btn-status btn-falta' + (faltaOn?' on':'') + '" data-date="' + key + '" data-action="falta">Falta</button>';
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="day-horas' + (trabalhouOn?' show':'') + '" data-date="' + key + '">';
      html += '    <button class="btn-horas' + (horas===4?' on':'') + '" data-date="' + key + '" data-horas="4">4h</button>';
      html += '    <button class="btn-horas' + (horas===8?' on':'') + '" data-date="' + key + '" data-horas="8">8h</button>';
      html += '  </div>';
      html += '</div>';
    }
    document.getElementById("days-list").innerHTML = html;
    updateSummaryRegistro();
  }

  function updateSummaryRegistro(){
    var trabalhados = 0, horas = 0, faltas = 0;
    var prefix = curYear + "-" + pad2(curMonth+1) + "-";
    Object.keys(diasData).forEach(function(key){
      if(key.indexOf(prefix) !== 0) return;
      var e = diasData[key];
      if(e.trabalhou === true){ trabalhados++; horas += (e.horas || 0); }
      else if(e.trabalhou === false){ faltas++; }
    });
    document.getElementById("sum-trabalhados").textContent = trabalhados;
    document.getElementById("sum-horas").textContent = horas + "h";
    document.getElementById("sum-faltas").textContent = faltas;
  }

  function setDia(key, changes){
    var entry = diasData[key] || {data:key, trabalhou:null, horas:null};
    Object.assign(entry, changes);
    diasData[key] = entry;
    dbPut("dias", entry);
  }

  function removeDia(key){
    delete diasData[key];
    dbDelete("dias", key);
  }

  document.getElementById("days-list").addEventListener("click", function(ev){
    var btn = ev.target.closest("button");
    if(!btn) return;
    var key = btn.getAttribute("data-date");
    if(!key) return;

    if(btn.classList.contains("btn-trabalhou")){
      var entry = diasData[key];
      if(entry && entry.trabalhou === true){
        removeDia(key);
      } else {
        setDia(key, {trabalhou:true, horas:(entry && entry.horas) ? entry.horas : 8});
      }
      renderCalendar();
    } else if(btn.classList.contains("btn-falta")){
      var entry2 = diasData[key];
      if(entry2 && entry2.trabalhou === false){
        removeDia(key);
      } else {
        setDia(key, {trabalhou:false, horas:null});
      }
      renderCalendar();
    } else if(btn.classList.contains("btn-horas")){
      var h = parseInt(btn.getAttribute("data-horas"), 10);
      setDia(key, {trabalhou:true, horas:h});
      renderCalendar();
    }
  });

  function gerarRelatorioMes(){
    var prefix = curYear + "-" + pad2(curMonth+1) + "-";
    var diasCheios = 0;   // 8h
    var meiosDias = 0;    // 4h
    var totalHoras = 0;

    Object.keys(diasData).forEach(function(key){
      if(key.indexOf(prefix) !== 0) return;
      var e = diasData[key];
      if(e.trabalhou === true){
        var h = e.horas || 0;
        if(h === 8) diasCheios++;
        else if(h === 4) meiosDias++;
        totalHoras += h;
      }
    });

    var diasEquivalentes = diasCheios + (meiosDias * 0.5);
    var diasEquivStr = (diasEquivalentes % 1 === 0)
      ? String(diasEquivalentes)
      : diasEquivalentes.toFixed(1).replace(".", ",");

    var valorTotal = totalHoras * valorHora;
    var recebidoMes = recebimentos
      .filter(function(r){ return (r.data || "").indexOf(prefix) === 0; })
      .reduce(function(sum, r){ return sum + (Number(r.valor) || 0); }, 0);
    var faltaReceber = valorTotal - recebidoMes;

    var linhas = [];
    linhas.push("*Relatório de Ponto - " + MESES[curMonth] + "/" + curYear + "*");
    linhas.push("");

    if(diasCheios === 0 && meiosDias === 0){
      linhas.push("Nenhum dia trabalhado registrado neste mês.");
    } else {
      linhas.push("Total de dias trabalhados: " + diasEquivStr);
      if(valorHora > 0){
        linhas.push("Valor total: " + fmtMoney(valorTotal));
        linhas.push("Recebido no mês: " + fmtMoney(recebidoMes));
        linhas.push("");
        linhas.push("*Falta receber: " + fmtMoney(faltaReceber) + "*");
      }
    }

    return linhas.join("\n");
  }

  document.getElementById("btn-share-whatsapp").addEventListener("click", function(){
    var texto = gerarRelatorioMes();
    var url = "https://wa.me/?text=" + encodeURIComponent(texto);
    window.open(url, "_blank");
  });

  document.getElementById("prev-month").addEventListener("click", function(){
    curMonth--; if(curMonth < 0){ curMonth = 11; curYear--; }
    renderCalendar();
  });
  document.getElementById("next-month").addEventListener("click", function(){
    curMonth++; if(curMonth > 11){ curMonth = 0; curYear++; }
    renderCalendar();
  });

  // ---------- Render: Desconto ----------
  function updateTotaisDesconto(){
    var totalHoras = 0;
    Object.keys(diasData).forEach(function(key){
      var e = diasData[key];
      if(e.trabalhou === true) totalHoras += (e.horas || 0);
    });
    var valorTotal = totalHoras * valorHora;
    var totalRecebido = recebimentos.reduce(function(sum, r){ return sum + (Number(r.valor) || 0); }, 0);
    var saldo = valorTotal - totalRecebido;

    document.getElementById("tot-horas").textContent = totalHoras + "h";
    document.getElementById("tot-valor").textContent = fmtMoney(valorTotal);
    document.getElementById("tot-recebido").textContent = fmtMoney(totalRecebido);
    document.getElementById("tot-saldo").textContent = fmtMoney(saldo);
  }

  function renderRecebimentos(){
    var list = recebimentos.slice().sort(function(a,b){ return (b.data||"").localeCompare(a.data||""); });
    if(list.length === 0){
      document.getElementById("receb-list").innerHTML = '<div class="empty">Nenhum recebimento registrado.</div>';
      updateTotaisDesconto();
      return;
    }
    var html = "";
    list.forEach(function(r){
      var dataFmt = "-";
      if(r.data){
        var parts = r.data.split("-");
        if(parts.length === 3) dataFmt = parts[2] + "/" + parts[1] + "/" + parts[0];
      }
      html += '<div class="receb-item">';
      html += '  <div class="receb-info">';
      html += '    <div class="val">' + fmtMoney(r.valor) + '</div>';
      html += '    <div class="meta">' + dataFmt + (r.desc ? " · " + escapeHtml(r.desc) : "") + '</div>';
      html += '  </div>';
      html += '  <button class="receb-del" data-id="' + r.id + '">✕</button>';
      html += '</div>';
    });
    document.getElementById("receb-list").innerHTML = html;
    updateTotaisDesconto();
  }

  function escapeHtml(s){
    var div = document.createElement("div");
    div.textContent = s;
    return div.innerHTML;
  }

  document.getElementById("receb-list").addEventListener("click", function(ev){
    var btn = ev.target.closest(".receb-del");
    if(!btn) return;
    var id = btn.getAttribute("data-id");
    recebimentos = recebimentos.filter(function(r){ return String(r.id) !== String(id); });
    dbDelete("recebimentos", id);
    renderRecebimentos();
  });

  document.getElementById("btn-add-receb").addEventListener("click", function(){
    var dataEl = document.getElementById("receb-data");
    var valorEl = document.getElementById("receb-valor");
    var descEl = document.getElementById("receb-desc");
    var valor = parseFloat(valorEl.value);
    if(!valor || valor <= 0){
      valorEl.focus();
      return;
    }
    var entry = {
      id: Date.now() + "_" + Math.floor(Math.random()*1000),
      data: dataEl.value || dateKey(today.getFullYear(), today.getMonth(), today.getDate()),
      valor: valor,
      desc: (descEl.value || "").trim()
    };
    recebimentos.push(entry);
    dbPut("recebimentos", entry);
    valorEl.value = "";
    descEl.value = "";
    renderRecebimentos();
  });

  document.getElementById("valor-dia").addEventListener("change", function(ev){
    var v = parseFloat(ev.target.value);
    valorDia = isNaN(v) ? 0 : v;
    recalcValorHora();
    dbPut("config", {key:"valorDia", value: valorDia});
    updateTotaisDesconto();
  });

  // ---------- Tabs ----------
  var tabButtons = document.querySelectorAll(".tab-btn");
  tabButtons.forEach(function(btn){
    btn.addEventListener("click", function(){
      var tab = btn.getAttribute("data-tab");
      tabButtons.forEach(function(b){ b.classList.toggle("active", b === btn); });
      document.getElementById("tab-registro").classList.toggle("active", tab === "registro");
      document.getElementById("tab-desconto").classList.toggle("active", tab === "desconto");
    });
  });

  // ---------- Init ----------
  function init(){
    openDatabase().then(function(){
      return Promise.all([dbGetAll("dias"), dbGetAll("recebimentos"), dbGetAll("config")]);
    }).then(function(results){
      var diasArr = results[0] || [];
      recebimentos = results[1] || [];
      var configArr = results[2] || [];

      diasData = {};
      diasArr.forEach(function(e){ diasData[e.data] = e; });

      var vdCfg = configArr.find(function(c){ return c.key === "valorDia"; });
      valorDia = vdCfg ? Number(vdCfg.value) || 0 : 0;
      recalcValorHora();
      document.getElementById("valor-dia").value = valorDia ? valorDia : "";

      var dataEl = document.getElementById("receb-data");
      if(!dataEl.value) dataEl.value = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

      renderCalendar();
      renderRecebimentos();
    });
  }

  init();
})();
</script>
</body>
</html>
